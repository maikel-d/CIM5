<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dirección General - Mantenimiento</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  h1 { font-size: 24px; margin-bottom: 12px; font-weight: 600; }
  p { font-size: 15px; opacity: 0.85; line-height: 1.6; margin-bottom: 24px; }
  .retry-btn {
    display: inline-block;
    padding: 12px 32px;
    background: white;
    color: #1e3a5f;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: none;
  }
  .retry-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .countdown {
    margin-top: 16px;
    font-size: 13px;
    opacity: 0.6;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <h1>Mantenimiento programado</h1>
  <p>El sistema se está actualizando. Los cambios se aplicarán en segundos. No se perderá ningún dato.</p>
  <button class="retry-btn" onclick="recargar()">↻ Reintentar ahora</button>
  <div class="countdown" id="countdown">Reintentando en <span id="seconds">10</span>s...</div>
</div>
<script>
let segundos = 10;
function recargar() { location.reload(); }
setInterval(() => {
  segundos--;
  document.getElementById('seconds').textContent = Math.max(0, segundos);
  if (segundos <= 0) { location.reload(); }
}, 1000);
</script>
</body>
</html>
