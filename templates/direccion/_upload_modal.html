<!-- Upload Modal (partial) -->
<div id="modal-subida-{{ suffix }}" class="upload-modal-overlay" style="display:none" onclick="if(event.target===this)cerrarModalSubida('{{ suffix }}')">
  <div class="upload-modal">
    <div class="upload-modal-header">
      <div class="upload-modal-title">
        <div class="upload-title-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        </div>
        <div>
          <h3>Subir Documento</h3>
          <p class="upload-modal-subtitle">{{ subtitle }}</p>
        </div>
      </div>
      <button type="button" class="upload-modal-close" onclick="cerrarModalSubida('{{ suffix }}')" title="Cerrar">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <form method="post" action="{{ upload_url }}" enctype="multipart/form-data" class="upload-modal-body">
      {% csrf_token %}
      
      <div class="upload-drop-area" id="upload-drop-{{ suffix }}">
        <input type="file" name="archivo" id="file-input-{{ suffix }}-modal" required class="file-input-hidden" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.webp" onchange="onFileSelectedUpload(this, '{{ suffix }}')">
        <div class="upload-drop-cloud">
          <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        </div>
        <p class="upload-drop-text">Arrastra y suelta tu archivo aqui, o <span class="upload-drop-link">examina</span></p>
        <p class="upload-drop-hint">PDF, Word (doc/docx) e imagenes (png, jpg, webp)</p>
      </div>

      <div class="upload-file-card" id="upload-file-card-{{ suffix }}" style="display:none">
        <div class="upload-file-icon" id="upload-file-icon-{{ suffix }}">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
        </div>
        <div class="upload-file-details">
          <span class="upload-file-name" id="upload-file-name-{{ suffix }}"></span>
          <span class="upload-file-size" id="upload-file-size-{{ suffix }}"></span>
        </div>
        <button type="button" class="upload-file-remove" onclick="limpiarArchivoUpload('{{ suffix }}')" title="Quitar archivo">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="upload-modal-fields">
        <div class="upload-field-group">
          <label class="upload-field-label">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
            Descripcion
          </label>
          <div class="upload-field-input">
            <input type="text" name="descripcion" placeholder="Ej: Documento de identificacion" class="form-input">
          </div>
        </div>
      </div>

      <div id="progress-bar-{{ suffix }}" class="hidden mb-3">
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs font-medium text-gray-600">Subiendo...</span>
          <span id="progress-pct-{{ suffix }}" class="text-xs font-semibold text-gray-700">0%</span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
          <div id="progress-fill-{{ suffix }}" class="h-full rounded-full" style="width:0%;background:linear-gradient(90deg,#059669,#10b981,#34d399);transition:width 0.3s ease"></div>
        </div>
      </div>
      
      <div class="upload-modal-footer">
        <button type="button" onclick="cerrarModalSubida('{{ suffix }}')" class="upload-btn upload-btn-cancel">Cancelar</button>
        <button type="submit" class="upload-btn upload-btn-submit" id="btn-subir-{{ suffix }}">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          Subir Documento
        </button>
      </div>
    </form>
  </div>
</div>

<script>
function abrirModalSubida(suffix) {
  abrirModalUpload('modal-subida-' + suffix);
}
function cerrarModalSubida(suffix) {
  cerrarModalUpload('modal-subida-' + suffix, suffix);
}
document.addEventListener('DOMContentLoaded', function() {
  var suffix = '{{ suffix }}';
  initModalClickOutside('modal-subida-' + suffix, function() { cerrarModalSubida(suffix); });
  initModalEscape(function() { cerrarModalSubida(suffix); });
  initDropZone('upload-drop-' + suffix, 'file-input-' + suffix + '-modal', 'onFileSelectedUpload');
});
</script>
