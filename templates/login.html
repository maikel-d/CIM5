{% extends 'base.html' %}
{% load static %}
{% block title %}Iniciar Sesión{% endblock %}
{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-[#003363] relative overflow-hidden">
    <!-- Watermark Logo -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none select-none fade-in">
        <img src="{% static 'images/logo.png' %}" alt="" class="w-full h-full object-contain opacity-10 p-4 md:p-8">
    </div>
    <div class="w-full max-w-md relative z-10">
        <div class="bg-white/5 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/10 fade-in-up">
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <img src="{% static 'images/logo_acceso.png' %}" alt="Logo" class="w-44 h-20 object-contain">
                </div>
                <h2 class="text-2xl font-bold text-white">SISTEMA CIM5</h2>
            </div>
            
            <form method="post" class="space-y-5">
                {% csrf_token %}
                {% if messages %}
                    {% for message in messages %}
                    <div class="p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30{% else %}bg-green-500/20 text-green-300 border border-green-500/30{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
                
                <div>
                    <input type="text" name="username" placeholder="Nombre de usuario" required autocomplete="username"
                        class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-lg text-white placeholder-gray-500 text-center focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent transition-all">
                </div>
                
                <div>
                    <input type="password" name="password" placeholder="Contraseña" required autocomplete="current-password"
                        class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-lg text-white placeholder-gray-500 text-center focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent transition-all">
                </div>
                
                <button type="submit"
                    class="group relative w-full py-3 px-4 bg-gradient-to-r from-[#003363] via-[#004a80] to-[#00508a] hover:from-[#002244] hover:via-[#003d6b] hover:to-[#004a80] text-white font-semibold rounded-lg transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:ring-offset-2 focus:ring-offset-[#003363] overflow-hidden shadow-lg hover:shadow-xl hover:shadow-[#003363]/25">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                        </svg>
                        Ingresar
                    </span>
                </button>
            </form>
            
            <p class="mt-6 text-center text-xs text-gray-500">
                Vigilancia Financiera al servicio de la Nación
            </p>
        </div>
    </div>
</div>
{% endblock %}
