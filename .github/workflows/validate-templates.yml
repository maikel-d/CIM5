name: Validate Django Templates & Lint

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run template block validation
        run: |
          python scripts/validate_templates.py --base-dir .

      - name: Run Django linter
        run: |
          python scripts/lint_django.py --base-dir .
