upstream django_app {
    server app:8000;
}

# ============================================
#   Servidor HTTP (Cloudflare Tunnel + local)
#   Cloudflare maneja SSL externamente.
#   El túnel de Cloudflare se conecta aquí.
# ============================================
server {
    listen 80 default_server;
    server_name cimcinco.com _;
    client_max_body_size 50M;

    # ACME HTTP-01 challenge (Let's Encrypt - opcional)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location /static/ {
        alias /DATA/CIM5NV/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /DATA/CIM5NV/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}

# ============================================
#   Redirigir www.cimcinco.com → cimcinco.com
#   Tanto para tráfico del túnel como local.
# ============================================
server {
    listen 80;
    server_name www.cimcinco.com;
    client_max_body_size 50M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://cimcinco.com$request_uri;
    }
}

# ============================================
#   Servidor HTTPS (acceso local autofirmado)
#   Para acceder desde la red local por HTTPS.
#   Usa certificados locales de ssl/.
# ============================================
server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 50M;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    error_page 497 =307 https://$host:443$request_uri;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location /static/ {
        alias /DATA/CIM5NV/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /DATA/CIM5NV/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
