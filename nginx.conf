upstream django_app {
    server app:8000;
}

# ============================================
#   Servidor HTTP (modo HTTP directo)
#   ACTIVO cuando DOMAIN está vacío (sin SSL).
#   Sirve la app directamente por HTTP.
# @HTTP_ONLY@
# ============================================
server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # ACME HTTP-01 challenge (Let's Encrypt - opcional)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location /static/ {
        alias /DATA/CIM5NV/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /DATA/CIM5NV/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
# @END_HTTP_ONLY@

# ============================================
#   Servidor HTTP (modo SSL redirect)
#   ACTIVO cuando DOMAIN está configurado (con SSL).
#   Redirige todo a HTTPS.
#   El puerto HTTPS externo se define en .env
#   como WEBUI_PORT_SSL (por defecto 443).
# @SSL_MODE@
# ============================================
server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # ACME HTTP-01 challenge (Let's Encrypt - opcional)
    # Debe ir ANTES del redirect general
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    # Redirigir todo lo demás a HTTPS
    # ⚠️ Cambia este puerto si WEBUI_PORT_SSL es distinto de 443
    location / {
        return 301 https://$host:443$request_uri;
    }
}
# @END_SSL_MODE@

# ============================================
#   Servidor HTTPS (autofirmado)
#   Usa certificados locales de ssl/.
#   Compatible con Let's Encrypt: al ejecutar
#   init-letsencrypt.sh los paths se actualizan.
# ============================================
server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 50M;

    # Certificados autofirmados locales (generados con configurar_ssl_local.sh)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Redirigir HTTP→HTTPS automáticamente si alguien envía HTTP al puerto SSL
    error_page 497 =307 https://$host:443$request_uri;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location /static/ {
        alias /DATA/CIM5NV/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /DATA/CIM5NV/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~* \.pdf$ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header X-Frame-Options;
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}

# ============================================
#   NOTA: Si usas Let's Encrypt, reemplaza
#   las rutas ssl_certificate con:
#     /etc/letsencrypt/live/direccion/fullchain.pem
#     /etc/letsencrypt/live/direccion/privkey.pem
#   y ejecuta: docker compose restart nginx
# ============================================
