# ============================================
# Rate Limiting Zones
# ============================================
# General: 60 requests/minute por IP (protección DoS básica, burst hasta 25)
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

# Login: 5 requests/minute por IP (protección fuerza bruta)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Parámetros globales de rate limiting
limit_req_status 429;
limit_req_log_level warn;

# ============================================
# Upstream & Proxy Config
# ============================================
upstream django_app {
    server app:8000;
    keepalive 32;
}

proxy_intercept_errors on;

proxy_connect_timeout 5s;
proxy_send_timeout 15s;
proxy_read_timeout 30s;

proxy_buffer_size 8k;
proxy_buffers 8 8k;
proxy_busy_buffers_size 16k;

proxy_http_version 1.1;
proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
proxy_next_upstream_tries 3;
proxy_next_upstream_timeout 10s;

server {
    listen 80 default_server;
    server_name cimcinco.com _;
    client_max_body_size 50M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location /static/ {
        alias /DATA/CIM5NV/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /DATA/CIM5NV/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /login/ {
        # Rate limiting estricto para login (5 req/min)
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_redirect off;
        error_page 502 503 @maintenance;
    }

    location / {
        # Rate limiting general (60 req/min, burst hasta 25)
        limit_req zone=general burst=15;
        # Redirigir HTTP a HTTPS solo para trafico directo (no Cloudflare tunnel)
        error_page 497 =307 https://$host:8443$request_uri;
        if ($http_cf_ray = "") {
            return 301 https://$host:8443$request_uri;
        }
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_redirect off;
        error_page 502 503 @maintenance;
    }

    location @maintenance {
        root /usr/share/nginx/html;
        try_files /maintenance.html =502;
    }
}

server {
    listen 80;
    server_name www.cimcinco.com;
    client_max_body_size 50M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://cimcinco.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 50M;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    error_page 497 =307 https://$host:443$request_uri;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    location /static/ {
        alias /DATA/CIM5NV/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /DATA/CIM5NV/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /login/ {
        # Rate limiting estricto para login (5 req/min)
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_redirect off;
        error_page 502 503 @maintenance;
    }

    location / {
        # Rate limiting general (60 req/min, burst hasta 25)
        limit_req zone=general burst=15;
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_redirect off;
        error_page 502 503 @maintenance;
    }

    location @maintenance {
        root /usr/share/nginx/html;
        try_files /maintenance.html =502;
    }
}

